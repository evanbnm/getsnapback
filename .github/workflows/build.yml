name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # Apple Silicon
            args: "--target aarch64-apple-darwin"
            target: aarch64-apple-darwin
          - platform: macos-13          # Intel
            args: "--target x86_64-apple-darwin"
            target: x86_64-apple-darwin
          - platform: windows-latest
            args: ""
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            args: ""
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # ── Node ──────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      # ── Rust ──────────────────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Linux system deps ─────────────────────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      # ── Sidecar binaries ──────────────────────────────────────────────────

      # macOS ARM: binary already committed — nothing to do.
      # macOS Intel: PAR-pack exiftool on the macos-13 runner.
      - name: Build standalone exiftool (macOS Intel)
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          brew install exiftool
          # --local-lib forces cpanm to install into ~/perl5 (avoids path issues on CI).
          curl -fsSL https://cpanmin.us | perl - --local-lib=~/perl5 App::cpanminus 2>&1
          ~/perl5/bin/cpanm --notest PAR::Packer 2>&1
          EXIFTOOL_LIB="$(brew --prefix exiftool)/libexec/lib/perl5"
          EXIFTOOL_BIN="$(brew --prefix exiftool)/libexec/bin/exiftool"
          perl \
            -I ~/perl5/lib/perl5 \
            -I ~/perl5/lib/perl5/$(perl -MConfig -e 'print $Config{archname}') \
            ~/perl5/bin/pp \
            -I "$EXIFTOOL_LIB" \
            -o src-tauri/binaries/exiftool-x86_64-apple-darwin \
            "$EXIFTOOL_BIN"
          chmod +x src-tauri/binaries/exiftool-x86_64-apple-darwin

      # Windows: discover current version from exiftool.org and download directly.
      - name: Install exiftool (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $html = (Invoke-WebRequest "https://exiftool.org" -UseBasicParsing).Content
          if ($html -match 'exiftool-([\d.]+)_64\.zip') {
            $zipName = "exiftool-$($Matches[1])_64.zip"
          } else {
            throw "Could not find exiftool Windows download link on exiftool.org"
          }
          Write-Host "Downloading https://exiftool.org/$zipName"
          Invoke-WebRequest "https://exiftool.org/$zipName" -OutFile exiftool.zip
          Expand-Archive exiftool.zip -DestinationPath exiftool_dir -Force
          $exe = Get-ChildItem -Path exiftool_dir -Recurse -Filter "*.exe" | Select-Object -First 1
          Copy-Item $exe.FullName "src-tauri\binaries\exiftool-x86_64-pc-windows-msvc.exe"

      # Linux: Perl is universally available; the plain script works fine.
      - name: Install exiftool (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get install -y libimage-exiftool-perl
          cp "$(which exiftool)" src-tauri/binaries/exiftool-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/exiftool-x86_64-unknown-linux-gnu

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Uncomment when you have signing certificates:
          # APPLE_CERTIFICATE:            ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD:   ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_ID:                     ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD:               ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID:                ${{ secrets.APPLE_TEAM_ID }}
          # TAURI_SIGNING_PRIVATE_KEY:    ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Snap Date Fixer ${{ github.ref_name }}"
          releaseBody: |
            Voir le README pour le premier lancement (Gatekeeper / SmartScreen).
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
