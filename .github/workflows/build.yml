name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # Apple Silicon
            args: "--target aarch64-apple-darwin"
            target: aarch64-apple-darwin
          - platform: windows-latest
            args: ""
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            args: ""
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # ── Node ──────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      # ── Rust ──────────────────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Linux system deps ─────────────────────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      # ── Sidecar: exiftool ─────────────────────────────────────────────────

      # macOS ARM: binary already committed to src-tauri/binaries/ — nothing to do.

      - name: Bundle exiftool (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $html = (Invoke-WebRequest "https://exiftool.org" -UseBasicParsing -TimeoutSec 30 -MaximumRetryCount 3 -RetryIntervalSec 10).Content
          if ($html -match 'exiftool-([\d.]+)_64\.zip') {
            $zipName = "exiftool-$($Matches[1])_64.zip"
          } else {
            throw "Could not find exiftool Windows download link on exiftool.org"
          }
          Write-Host "Downloading https://exiftool.org/$zipName"
          Invoke-WebRequest "https://exiftool.org/$zipName" -OutFile exiftool.zip -TimeoutSec 60 -MaximumRetryCount 3 -RetryIntervalSec 10
          Expand-Archive exiftool.zip -DestinationPath exiftool_dir -Force
          $exe = Get-ChildItem -Path exiftool_dir -Recurse -Filter "*.exe" | Select-Object -First 1
          Copy-Item $exe.FullName "src-tauri\binaries\exiftool-x86_64-pc-windows-msvc.exe"

      - name: Bundle exiftool (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get install -y libimage-exiftool-perl
          cp "$(which exiftool)" src-tauri/binaries/exiftool-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/exiftool-x86_64-unknown-linux-gnu

      # ── Sidecar: ffmpeg (static builds, no runtime dependencies) ──────────

      - name: Bundle ffmpeg (macOS ARM)
        if: matrix.platform == 'macos-latest'
        run: |
          curl -L https://evermeet.cx/ffmpeg/get/ffmpeg/zip -o ffmpeg.zip
          unzip ffmpeg.zip
          chmod +x ffmpeg
          cp ffmpeg src-tauri/binaries/ffmpeg-aarch64-apple-darwin

      - name: Bundle ffmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $release = Invoke-RestMethod "https://api.github.com/repos/BtbN/FFmpeg-Builds/releases/latest" -MaximumRetryCount 3 -RetryIntervalSec 10
          $asset = $release.assets | Where-Object { $_.name -like "*win64-gpl.zip" -and $_.name -notlike "*shared*" } | Select-Object -First 1
          Write-Host "Downloading $($asset.browser_download_url)"
          Invoke-WebRequest $asset.browser_download_url -OutFile ffmpeg.zip -TimeoutSec 120 -MaximumRetryCount 3 -RetryIntervalSec 10
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_dir -Force
          $exe = Get-ChildItem -Path ffmpeg_dir -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item $exe.FullName "src-tauri\binaries\ffmpeg-x86_64-pc-windows-msvc.exe"

      - name: Bundle ffmpeg (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          wget -q https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
          tar xf ffmpeg-release-amd64-static.tar.xz
          cp ffmpeg-*-static/ffmpeg src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Uncomment when you have signing certificates:
          # APPLE_CERTIFICATE:            ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD:   ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_ID:                     ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD:               ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID:                ${{ secrets.APPLE_TEAM_ID }}
          # TAURI_SIGNING_PRIVATE_KEY:    ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Snapback ${{ github.ref_name }}"
          releaseBody: |
            ### macOS — premier lancement obligatoire
            L'app n'étant pas signée par un certificat Apple Developer ($99/an),
            macOS affiche « est endommagé » au premier lancement.

            **Procédure :**
            1. Ouvrez le DMG et glissez **Snapback** dans **Applications**.
            2. Ouvrez **Terminal** (Spotlight → « Terminal »).
            3. Collez et exécutez la commande suivante :
               ```
               xattr -cr "/Applications/Snapback.app"
               ```
            4. Lancez l'app normalement. Les ouvertures suivantes ne demandent
               plus rien.

            ### Windows — premier lancement
            Sur l'écran « Windows a protégé votre ordinateur » :
            **Informations complémentaires** → **Exécuter quand même**.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
