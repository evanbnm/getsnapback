name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # Apple Silicon
            args: "--target aarch64-apple-darwin"
            target: aarch64-apple-darwin
          - platform: macos-13          # Intel runner (last x86_64 runner image)
            args: "--target x86_64-apple-darwin"
            target: x86_64-apple-darwin
          - platform: windows-latest
            args: ""
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            args: ""
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # ── Node ──────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      # ── Rust ──────────────────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Linux system deps ─────────────────────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      # ── Sidecar: ffmpeg ───────────────────────────────────────────────────
      # Static builds only — anything dynamically linked to system ffmpeg
      # libs (e.g. a Homebrew binary) will break on user machines.
      # Sources are chosen for HW encoder coverage matching video_encoder.rs:
      #   macOS  → osxexperts.net (videotoolbox)
      #   Win    → BtbN GPL       (nvenc + qsv + amf)
      #   Linux  → BtbN GPL       (nvenc + qsv)

      - name: Bundle ffmpeg (macOS arm64)
        if: matrix.target == 'aarch64-apple-darwin'
        run: |
          curl -fsSL https://www.osxexperts.net/ffmpeg71arm.zip -o ffmpeg.zip
          unzip -o ffmpeg.zip
          chmod +x ffmpeg
          cp ffmpeg src-tauri/binaries/ffmpeg-aarch64-apple-darwin
          file src-tauri/binaries/ffmpeg-aarch64-apple-darwin

      - name: Bundle ffmpeg (macOS Intel)
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          curl -fsSL https://www.osxexperts.net/ffmpeg71intel.zip -o ffmpeg.zip
          unzip -o ffmpeg.zip
          chmod +x ffmpeg
          cp ffmpeg src-tauri/binaries/ffmpeg-x86_64-apple-darwin
          file src-tauri/binaries/ffmpeg-x86_64-apple-darwin

      - name: Bundle ffmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $release = Invoke-RestMethod "https://api.github.com/repos/BtbN/FFmpeg-Builds/releases/latest" -MaximumRetryCount 3 -RetryIntervalSec 10
          $asset = $release.assets | Where-Object { $_.name -like "*win64-gpl.zip" -and $_.name -notlike "*shared*" } | Select-Object -First 1
          Write-Host "Downloading $($asset.browser_download_url)"
          Invoke-WebRequest $asset.browser_download_url -OutFile ffmpeg.zip -TimeoutSec 180 -MaximumRetryCount 3 -RetryIntervalSec 10
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_dir -Force
          $exe = Get-ChildItem -Path ffmpeg_dir -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item $exe.FullName "src-tauri\binaries\ffmpeg-x86_64-pc-windows-msvc.exe"

      - name: Bundle ffmpeg (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          # BtbN gpl static build: includes h264_nvenc + h264_qsv so our HW
          # encoder probe in video_encoder.rs can pick them when the host has
          # the matching GPU/driver. Falls back to libx264 otherwise.
          asset_url=$(curl -fsSL https://api.github.com/repos/BtbN/FFmpeg-Builds/releases/latest \
            | grep -oE 'https://[^"]+linux64-gpl\.tar\.xz' | grep -v shared | head -1)
          echo "Downloading $asset_url"
          curl -fsSL "$asset_url" -o ffmpeg.tar.xz
          mkdir -p ffmpeg_dir
          tar -xJf ffmpeg.tar.xz -C ffmpeg_dir --strip-components=1
          cp ffmpeg_dir/bin/ffmpeg src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Uncomment when you have signing certificates:
          # APPLE_CERTIFICATE:            ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD:   ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_ID:                     ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD:               ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID:                ${{ secrets.APPLE_TEAM_ID }}
          # TAURI_SIGNING_PRIVATE_KEY:    ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "GetSnapBack ${{ github.ref_name }}"
          releaseBody: |
            ## Téléchargement

            ### macOS
            - **Mac Apple Silicon** (M1/M2/M3/M4) → `GetSnapBack_*_aarch64.dmg`
            - **Mac Intel** → `GetSnapBack_*_x64.dmg`

            > Pour savoir lequel choisir : menu Pomme → À propos de ce Mac. Si la
            > ligne « Puce » mentionne Apple M*, prenez le fichier `aarch64`.

            ### Windows
            - `GetSnapBack_*_x64-setup.exe` (installeur) ou `GetSnapBack_*_x64_en-US.msi`

            ### Linux
            - `.AppImage` (universel) ou `.deb` (Debian/Ubuntu)

            ---

            ## Premier lancement

            ### macOS
            L'app n'étant pas signée par un certificat Apple Developer ($99/an),
            macOS bloque le premier lancement.

            **Procédure (une seule fois) :**
            1. Ouvrez le DMG et glissez **GetSnapBack** dans **Applications**.
            2. Lancez l'app une première fois (macOS affiche un avertissement,
               c'est normal — fermez la fenêtre).
            3. Ouvrez **Réglages Système → Confidentialité et sécurité**.
            4. Tout en bas, à la ligne mentionnant GetSnapBack, cliquez
               **Ouvrir quand même**, puis confirmez.
            5. Les ouvertures suivantes se font normalement, sans rien demander.

            ### Windows
            Sur l'écran « Windows a protégé votre ordinateur » :
            **Informations complémentaires** → **Exécuter quand même**.

            ### Linux (AppImage)
            ```
            chmod +x GetSnapBack_*.AppImage
            ./GetSnapBack_*.AppImage
            ```

            ---

            ## Nouveautés v1.1.0

            - **Vidéo plus rapide** : encodeur matériel sélectionné automatiquement
              (VideoToolbox sur Mac, NVENC/QSV/AMF sur Windows, libx264 fast en
              fallback). 2-10× plus rapide selon la machine.
            - **Photo overlay parallélisé** : utilise tous les cœurs CPU au lieu
              d'un seul. Plusieurs fois plus rapide sur les gros exports.
            - **Build natif Mac Intel** ajouté (avant, le binaire arm64 tournait
              via Rosetta sur les Mac Apple Silicon — corrigé).
            - **Barre de progression** désormais visible dès le démarrage
              (étape d'analyse des fichiers).
            - **Langue auto** selon le navigateur / système au premier lancement.
            - Au clic sur « Traiter un autre export », la fenêtre revient
              proprement en haut.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
